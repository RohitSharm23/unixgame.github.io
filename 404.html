<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0c0c0c,#1a1a2e,#16213e);
    color:white;
    text-align:center;
}

.container{
    max-width:600px;
}

h1{
    font-size:120px;
    margin:0;
    color:#00d4ff;
}

h2{
    font-size:30px;
    margin:10px 0;
}

p{
    color:#bbb;
    margin-bottom:30px;
}

.home-btn{
    display:inline-block;
    padding:15px 30px;
    background:#00d4ff;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    transition:0.3s;
}

.home-btn:hover{
    background:white;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>The page you are looking for doesn't exist or failed to load.</p>

<a href="index.html" class="home-btn">Go To Homepage</a>

</div>

</body>
</html>
