<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 -Error</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
      color: #00ffcc;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      animation: flicker 1.5s infinite alternate;
    }

    h1 {
      font-size: 5rem;
      margin-bottom: 20px;
      color: #ff004c;
      text-shadow: 0 0 10px #ff004c, 0 0 20px #ff004c;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    p {
      font-size: 0.9rem;
      margin-bottom: 40px;
      color: #ffffff;
    }

    .btn {
      padding: 15px 30px;
      background: #00ffcc;
      color: #000;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s ease;
      box-shadow: 0 0 10px #00ffcc;
    }

    .btn:hover {
      background: #ff004c;
      color: #fff;
      box-shadow: 0 0 15px #ff004c;
    }

    @keyframes flicker {
      from { opacity: 0.8; }
      to { opacity: 1; }
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      left: 0;
    }

    .glitch::before {
      animation: glitchTop 1s infinite;
      color: #00fff9;
      clip-path: inset(0 0 50% 0);
    }

    .glitch::after {
      animation: glitchBottom 1s infinite;
      color: #ff00c8;
      clip-path: inset(50% 0 0 0);
    }

    @keyframes glitchTop {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, -3px); }
      40% { transform: translate(3px, 3px); }
      60% { transform: translate(-2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    @keyframes glitchBottom {
      0% { transform: translate(0); }
      20% { transform: translate(3px, 3px); }
      40% { transform: translate(-3px, -3px); }
      60% { transform: translate(2px, -2px); }
      80% { transform: translate(-2px, 2px); }
      100% { transform: translate(0); }
    }

  </style>
</head>
<body>
  <div class="container">
    <h1 class="glitch">404</h1>
    <h2>Error</h2>
    <p>The page you're looking for has respawned somewhere else.</p>
    <a href="unixgame.online/games.html" class="btn">play Game</a>
  </div>
</body>
</html>
