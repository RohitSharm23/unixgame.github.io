<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Game Over</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: #fff;
}

/* CONTAINER */
.container {
    text-align: center;
}

/* 404 TEXT */
h1 {
    font-size: 90px;
    color: #22c55e;
    text-shadow: 0 0 15px #22c55e;
    animation: pulse 2s infinite;
}

/* ANIMATION */
@keyframes pulse {
    0% { text-shadow: 0 0 10px #22c55e; }
    50% { text-shadow: 0 0 25px #22c55e; }
    100% { text-shadow: 0 0 10px #22c55e; }
}

/* MESSAGE */
p {
    font-size: 20px;
    margin: 10px 0 30px;
    color: #cbd5f5;
}

/* BUTTON */
a {
    text-decoration: none;
    color: #22c55e;
    border: 2px solid #22c55e;
    padding: 10px 25px;
    border-radius: 8px;
    transition: 0.3s;
}

a:hover {
    background: #22c55e;
    color: #000;
    box-shadow: 0 0 15px #22c55e;
}
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Oops! This level doesn't exist.</p>
    <a href="games.html">Go Back other games</a>
</div>

</body>
</html>
