<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Game Over</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0c0c0c,#1a1a2e,#16213e);
color:white;
text-align:center;
overflow:hidden;
}

.container{
max-width:600px;
}

h1{
font-size:130px;
color:#00d4ff;
text-shadow:0 0 20px #00d4ff,0 0 40px #00d4ff;
animation: glow 2s infinite alternate;
}

h2{
font-size:35px;
margin-top:10px;
}

p{
color:#bbb;
margin:20px 0 30px;
font-size:18px;
}

.home-btn{
display:inline-block;
padding:15px 35px;
background:#00d4ff;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:40px;
transition:0.3s;
}

.home-btn:hover{
background:white;
transform:scale(1.1);
box-shadow:0 0 20px #00d4ff;
}

@keyframes glow{
from{
text-shadow:0 0 10px #00d4ff;
}
to{
text-shadow:0 0 30px #00d4ff,0 0 60px #00d4ff;
}
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>

<h2>🎮 Game Over</h2>

<p>The level you are trying to reach does not exist.</p>

<a href="index.html" class="home-btn">Return to Home</a>

</div>

</body>
</html>
