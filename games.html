<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unixgameb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            height: 60px;
            width: 60px;
            border-radius: 15px;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #00d4ff;
        }

        .logo:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00d4ff;
        }

        .search-box {
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            height: 50px;
            padding: 0 20px 0 50px;
            border: 2px solid #333;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #aaa;
        }

        /* Main Content */
        .main-content {
            padding-top: 80px;
            width: 100vw;
            padding-left: 0;
            padding-right: 0;
        }

        /* Game Grid - EXACTLY 3 ROWS */
        .games-grid {
            display: grid;
            grid-template-rows:repeat(3 ,1fr);
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            width: 100vw;
            
            padding: 0;
            margin: 0;
        }

        .game-card {
            aspect-ratio: 1 / 1;
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            border-radius: 15px;
        }

        .game-card:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.3);
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-fit:cover; 
            object-position: center;
            transition: transform 0.4s ease;
            position: absolute;
            top: 0;
            left: 0;
            transform: scale(1);
        }

        .game-card:hover .game-image {
            transform: scale(1.05);
        }

        .game-overlay {
            position: relative;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            width: 100%;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .game-card:hover .game-overlay {
            transform: translateY(0);
        }

        .game-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Responsive - Always 3 rows */
        @media (max-width: 1200px) {
            .games-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
                height: 70px;
            }

            .logo {
                height: 50px;
                width: 50px;
            }

            .search-input {
                height: 45px;
                font-size: 14px;
                padding-left: 45px;
            }

            .main-content {
                padding-top: 90px;          /* space b/w the game card and the search bar*/
            }

            .games-grid {
                grid-template-rows: repeat(3, 1fr);
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                height: calc(100vh - 70px);
            }
        }

        @media (max-width: 480px) {
            .games-grid {
                grid-template-rows: repeat(3, 90px);            /* STILL 3 ROWS */
                grid-template-columns: repeat(3,120px);        /* 1 column on mobile */
                height: calc(100vh - 70px);
            }
        }

        /* Hide extra cards when searching */
        .game-card.hidden {
            display: none;
        }

        /* Loading Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            animation-fill-mode: both;
        }

        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
        .game-card:nth-child(5) { animation-delay: 0.5s; }
        .game-card:nth-child(6) { animation-delay: 0.6s; }
        .game-card:nth-child(7) { animation-delay: 0.7s; }
        .game-card:nth-child(8) { animation-delay: 0.8s; }
        .game-card:nth-child(9) { animation-delay: 0.9s; }
    </style>
</head>

  <script>
const searchInput = document.querySelector('.search-input');
const gameCards = document.querySelectorAll('.game-card');
const gamesGrid = document.querySelector('.games-grid');

searchInput.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    
    gameCards.forEach((card, index) => {
        const title = card.querySelector('.game-title').textContent.toLowerCase();
        const shouldShow = title.includes(searchTerm) || searchTerm === '';
        
        if (shouldShow) {
            card.style.display = 'block';
            card.style.gridColumnStart = (index % 3) + 1;  // Column 1,2,3
            card.style.gridRowStart = Math.floor(index / 3) + 1;  // Row 1,2,3
        } else {
            card.style.display = 'none';
        }
    });
});
</script>
