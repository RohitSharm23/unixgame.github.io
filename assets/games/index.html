<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Categories</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
    }

    header {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #020617;
    }

    header h1 {
      font-size: 1.5rem;
    }

    .search-box input {
      padding: 0.5rem;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .container {
      padding: 2rem;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #1e293b;
      padding: 1.5rem;
      border-radius: 16px;
      transition: transform 0.3s, background 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    .card h3 {
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.9rem;
      color: #cbd5f5;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        gap: 1rem;
      }

      header h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 Games</h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search category...">
  </div>
</header>

<div class="container">
  <div class="categories" id="categoryList">

    <a href="action.html" class="card" data-name="action">
      <h3>Action</h3>
      <p>Fast-paced games full of excitement.</p>
    </a>

    <a href="adventure.html" class="card" data-name="adventure">
      <h3>Adventure</h3>
      <p>Explore worlds and go on epic journeys.</p>
    </a>

    <a href="racing.html" class="card" data-name="racing">
      <h3>Racing</h3>
      <p>Speed and competition on tracks.</p>
    </a>

    <a href="puzzle.html" class="card" data-name="puzzle">
      <h3>Puzzle</h3>
      <p>Test your brain with challenges.</p>
    </a>

    <a href="sports.html" class="card" data-name="sports">
      <h3>Sports</h3>
      <p>Play your favorite sports virtually.</p>
    </a>

    <a href="strategy.html" class="card" data-name="strategy">
      <h3>Strategy</h3>
      <p>Plan and conquer your enemies.</p>
    </a>

  </div>
</div>

<script>
  const searchInput = document.getElementById('search');
  const cards = document.querySelectorAll('.card');

  searchInput.addEventListener('keyup', () => {
    const value = searchInput.value.toLowerCase();

    cards.forEach(card => {
      const name = card.getAttribute('data-name');

      if (name.includes(value)) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  });
</script>

</body>
</html>
